name: Test

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "uml/**"
      - "LICENSE"
      - ".vscode/**"
      - ".idea/**"
      - "**/*.log"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "uml/**"
      - "LICENSE"
      - ".vscode/**"
      - ".idea/**"
      - "**/*.log"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LEPTOS_OUTPUT_NAME: logmancer-web

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu workspace
            os: ubuntu-latest
            cache_key: ubuntu-workspace
            test_command: cargo test --workspace --verbose
            clippy: true
          - name: windows 2025 vs2026 core
            os: windows-2025-vs2026
            cache_key: windows-2025-vs2026-core
            test_command: cargo test -p logmancer-core --verbose
            clippy: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            librsvg2-dev

      - name: Preflight Linux pkg-config dependencies
        if: runner.os == 'Linux'
        run: |
          pkg-config --exists glib-2.0
          pkg-config --exists gdk-3.0
          pkg-config --exists gtk+-3.0
          pkg-config --exists libsoup-3.0
          pkg-config --exists javascriptcoregtk-4.1
          pkg-config --exists webkit2gtk-4.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ runner.os }}-${{ matrix.cache_key }}

      - name: Run tests
        run: ${{ matrix.test_command }}

      - name: Run clippy
        if: matrix.clippy
        run: cargo clippy --workspace -- -D warnings
