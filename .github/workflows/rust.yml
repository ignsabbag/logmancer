name: Rust

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "uml/**"
      - "LICENSE"
      - ".vscode/**"
      - ".idea/**"
      - "**/*.log"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "uml/**"
      - "LICENSE"
      - ".vscode/**"
      - ".idea/**"
      - "**/*.log"

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            librsvg2-dev

      - name: Preflight Linux pkg-config dependencies
        run: |
          pkg-config --exists glib-2.0
          pkg-config --exists gdk-3.0
          pkg-config --exists gtk+-3.0
          pkg-config --exists libsoup-3.0
          pkg-config --exists javascriptcoregtk-4.1
          pkg-config --exists webkit2gtk-4.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ runner.os }}

      - name: Run tests
        run: cargo test --workspace --verbose

  build:
    name: Build for ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            librsvg2-dev

      - name: Preflight Linux pkg-config dependencies
        if: runner.os == 'Linux'
        run: |
          pkg-config --exists glib-2.0
          pkg-config --exists gdk-3.0
          pkg-config --exists gtk+-3.0
          pkg-config --exists libsoup-3.0
          pkg-config --exists javascriptcoregtk-4.1
          pkg-config --exists webkit2gtk-4.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ runner.os }}-${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: logmancer-binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/logmancer-tui
            target/${{ matrix.target }}/release/logmancer-web
            target/${{ matrix.target }}/release/logmancer-desktop
            target/${{ matrix.target }}/release/logmancer-tui.exe
            target/${{ matrix.target }}/release/logmancer-web.exe
            target/${{ matrix.target }}/release/logmancer-desktop.exe
          if-no-files-found: error

  cleanup-artifacts:
    name: Keep only latest main artifacts
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest

    steps:
      - name: Delete older main binary artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const currentRunId = context.runId;
            const staleArtifacts = artifacts.filter((artifact) => {
              const isLogmancerBinaryArtifact = artifact.name.startsWith('logmancer-binaries-')
                || artifact.name.startsWith('logmancer-tui-');

              return isLogmancerBinaryArtifact
                && artifact.workflow_run?.head_branch === 'main'
                && artifact.workflow_run?.id !== currentRunId;
            });

            for (const artifact of staleArtifacts) {
              core.info(`Deleting artifact ${artifact.name} from run ${artifact.workflow_run?.id}`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
