name: Build

on:
  workflow_run:
    workflows: ["Test"]
    branches: ["main"]
    types: [completed]

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always
  LEPTOS_OUTPUT_NAME: logmancer-web

jobs:
  build:
    name: Package for ${{ matrix.package_name }}
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_name: linux
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            package_name: windows

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            zip \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            librsvg2-dev

      - name: Preflight Linux pkg-config dependencies
        if: runner.os == 'Linux'
        run: |
          pkg-config --exists glib-2.0
          pkg-config --exists gdk-3.0
          pkg-config --exists gtk+-3.0
          pkg-config --exists libsoup-3.0
          pkg-config --exists javascriptcoregtk-4.1
          pkg-config --exists webkit2gtk-4.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Cache Rust dependencies
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ runner.os }}-${{ matrix.package_name }}

      - name: Install cargo-leptos
        run: cargo install cargo-leptos --locked

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build web site assets
        env:
          LEPTOS_OUTPUT_NAME: logmancer-web
          LEPTOS_SITE_ROOT: target/site
        run: cargo leptos build --release --project logmancer-web

      - name: Package Linux artifacts
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          target_dir="target/${{ matrix.target }}/release"
          package_root="dist/logmancer-${{ matrix.package_name }}"

          mkdir -p "$package_root"
          cp "$target_dir/logmancer-web" "$package_root/"
          cp "$target_dir/logmancer-desktop" "$package_root/"
          cp "$target_dir/logmancer-tui" "$package_root/"
          cp -R target/site "$package_root/site"
          cp packaging/portable/README.txt "$package_root/"
          cp packaging/portable/linux/run-web.sh "$package_root/"
          cp packaging/portable/linux/run-desktop.sh "$package_root/"

          chmod +x "$package_root/run-web.sh" "$package_root/run-desktop.sh"

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $targetDir = "target/${{ matrix.target }}/release"
          $packageRoot = "dist/logmancer-${{ matrix.package_name }}"

          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          Copy-Item "$targetDir/logmancer-web.exe" "$packageRoot/"
          Copy-Item "$targetDir/logmancer-desktop.exe" "$packageRoot/"
          Copy-Item "$targetDir/logmancer-tui.exe" "$packageRoot/"
          Copy-Item "target/site" "$packageRoot/site" -Recurse -Force
          Copy-Item "packaging/portable/README.txt" "$packageRoot/"
          Copy-Item "packaging/portable/windows/run-web.cmd" "$packageRoot/"
          Copy-Item "packaging/portable/windows/run-desktop.cmd" "$packageRoot/"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: logmancer-package-${{ matrix.package_name }}
          path: dist/logmancer-${{ matrix.package_name }}
          if-no-files-found: error

  cleanup-artifacts:
    name: Keep only latest main artifacts
    needs: build
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && success()
    runs-on: ubuntu-latest

    steps:
      - name: Delete older main binary artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const currentRunId = context.runId;
            const staleArtifacts = artifacts.filter((artifact) => {
              const isLogmancerBinaryArtifact = artifact.name.startsWith('logmancer-binaries-')
                || artifact.name.startsWith('logmancer-package-')
                || artifact.name.startsWith('logmancer-tui-');

              return isLogmancerBinaryArtifact
                && artifact.workflow_run?.head_branch === 'main'
                && artifact.workflow_run?.id !== currentRunId;
            });

            for (const artifact of staleArtifacts) {
              core.info(`Deleting artifact ${artifact.name} from run ${artifact.workflow_run?.id}`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
